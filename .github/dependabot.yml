version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      types:
        patterns: ["@types/*"]
      dev-tooling:
        patterns: ["tsup", "tsx", "typescript", "vitest"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
